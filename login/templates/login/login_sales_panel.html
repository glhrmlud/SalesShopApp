{% extends 'login/login_base.html' %}

{% block login_container %}

{% block title %} <h2>Login - Sales Panel</h2> {% endblock %}

{% if form.errors %}
<p class="error-msg">Usuário ou senha incorretos. Tente novamente.</p>
{% endif %}

<form method="POST" action="">
  {% csrf_token %}

  <div class="form-group">
    <label for="id_username">Usuário</label>
    <input type="text" name="username" id="id_username" required placeholder="Digite seu usuário">
  </div>

  <div class="form-group">
    <label for="id_password">Senha</label>
    <input type="password" name="password" id="id_password" required placeholder="Digite sua senha">
  </div>

  <button type="submit" class="btn-login">Login</button>
</form>

{% endblock %}
